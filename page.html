<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(ellipse at center, #0a2a1a 0%, #041a10 40%, #000000 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', monospace;
    padding: 20px;
  }

  /* ---------- LOGIN CARD ---------- */
  .crt-screen {
    position: relative;
    width: 90%;
    max-width: 400px;
    background: radial-gradient(ellipse at center, #002b14 0%, #001505 100%);
    border-radius: 20px;
    box-shadow:
      inset 0 0 60px rgba(0,255,120,0.35),
      0 0 50px rgba(0,255,120,0.35);
    overflow: hidden;
    padding: 40px 30px;
    color: #39ff6a;
    text-shadow: 0 0 5px #39ff6a, 0 0 10px #39ff6a;
    animation: flicker 4s infinite;
  }

  .crt-screen::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.25) 0px,
      rgba(0,0,0,0.25) 1px,
      transparent 2px,
      transparent 3px
    );
    pointer-events: none;
    z-index: 2;
  }

  @keyframes flicker {
    0%   { opacity: 1; }
    2%   { opacity: 0.88; }
    4%   { opacity: 1; }
    50%  { opacity: 1; }
    52%  { opacity: 0.92; }
    54%  { opacity: 1; }
    100% { opacity: 1; }
  }

  h1 {
    text-align: center;
    font-size: 1.6em;
    letter-spacing: 2px;
    margin-top: 0;
    margin-bottom: 30px;
    position: relative;
    z-index: 1;
  }

  .form-group {
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
  }

  label {
    display: block;
    margin-bottom: 6px;
    font-size: 0.95em;
  }

  input {
    width: 100%;
    padding: 10px;
    background: #000;
    border: 1px solid #39ff6a;
    color: #39ff6a;
    font-family: 'Courier New', monospace;
    font-size: 1em;
    border-radius: 5px;
  }

  input:focus {
    outline: none;
    box-shadow: 0 0 8px #39ff6a;
  }

  .btn-row {
    display: flex;
    gap: 15px;
    margin-top: 25px;
    position: relative;
    z-index: 1;
  }

  button {
    flex: 1;
    padding: 12px;
    background: #000;
    border: 1px solid #39ff6a;
    color: #39ff6a;
    font-family: 'Courier New', monospace;
    font-size: 1em;
    letter-spacing: 1px;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #39ff6a;
    color: #000;
    box-shadow: 0 0 15px #39ff6a;
  }

  #message {
    margin-top: 20px;
    text-align: center;
    font-size: 0.95em;
    min-height: 20px;
    position: relative;
    z-index: 1;
  }

  .success { color: #39ff6a; }
  .error { color: #ff5555; text-shadow: 0 0 5px #ff5555; }

  /* ---------- HOTEL CARD ---------- */
  .hotel-screen {
    position: relative;
    width: 90%;
    max-width: 600px;
    background: radial-gradient(ellipse at center, #002b14 0%, #001505 100%);
    border-radius: 20px;
    box-shadow:
      inset 0 0 60px rgba(0,255,120,0.35),
      0 0 50px rgba(0,255,120,0.35);
    overflow: hidden;
    padding: 40px 35px;
    color: #39ff6a;
    text-shadow: 0 0 5px #39ff6a, 0 0 10px #39ff6a;
    display: none;
    animation: flicker 4s infinite;
  }

  .hotel-screen::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.25) 0px,
      rgba(0,0,0,0.25) 1px,
      transparent 2px,
      transparent 3px
    );
    pointer-events: none;
    z-index: 2;
  }

  .hotel-screen h1 {
    text-align: left;
    border-bottom: 1px solid #39ff6a;
    padding-bottom: 10px;
    position: relative;
    z-index: 1;
  }

  .hotel-content {
    position: relative;
    z-index: 1;
  }

  .rating {
    color: #ffe066;
    font-size: 1.1em;
    margin-bottom: 15px;
    text-shadow: 0 0 5px #ffe066;
  }

  .hotel-content p {
    line-height: 1.7;
    font-size: 1.02em;
  }

  .amenities {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 20px;
  }

  .badge {
    border: 1px solid #39ff6a;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.85em;
  }

  .logout {
    margin-top: 25px;
  }
</style>
</head>
<body>

  <!-- LOGIN + REGISTER SECTION -->
  <div class="crt-screen" id="loginCard">
    <h1>&gt; LOGIN_</h1>

    <div class="form-group">
      <label for="username">USERNAME</label>
      <input type="text" id="username" placeholder="Enter username">
    </div>

    <div class="form-group">
      <label for="password">PASSWORD</label>
      <input type="password" id="password" placeholder="Enter password">
    </div>

    <div class="btn-row">
      <button onclick="checkLogin()">LOGIN</button>
      <button onclick="registerUser()">REGISTER</button>
    </div>

    <div id="message"></div>
  </div>

  <!-- HOTEL SECTION (hidden until login) -->
  <div class="hotel-screen" id="hotelCard">
    <h1>&gt; GRAND VAIGAI HOTEL_</h1>
    <div class="hotel-content">
      <div class="rating">★★★★★ (4.9 / 5)</div>
      <p>Welcome! Enjoy a comfortable stay at Grand Vaigai Hotel, located in the heart of Madurai — just minutes away from the famous Meenakshi Amman Temple.</p>

      <div class="amenities">
        <span class="badge">Free WiFi</span>
        <span class="badge">Swimming Pool</span>
        <span class="badge">Restaurant</span>
        <span class="badge">Parking</span>
        <span class="badge">AC Rooms</span>
      </div>

      <div class="btn-row logout">
        <button onclick="logout()">LOGOUT</button>
      </div>
    </div>
  </div>

<script>
  const defaultUser = { username: "AFRIN", password: "AFRIN_12345m" };

  function getUsers() {
    const stored = localStorage.getItem("users");
    let users = stored ? JSON.parse(stored) : [];
    if (!users.some(u => u.username === defaultUser.username)) {
      users.push(defaultUser);
    }
    return users;
  }

  function checkLogin() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const message = document.getElementById("message");
    const users = getUsers();

    const found = users.find(u => u.username === username && u.password === password);

    if (found) {
      message.textContent = "Login successful! Redirecting...";
      message.className = "success";
      setTimeout(() => {
        document.getElementById("loginCard").style.display = "none";
        document.getElementById("hotelCard").style.display = "block";
      }, 800);
    } else {
      message.textContent = "Invalid username or password.";
      message.className = "error";
    }
  }

  function registerUser() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const message = document.getElementById("message");

    if (!username || !password) {
      message.textContent = "Please fill both fields to register.";
      message.className = "error";
      return;
    }

    let users = getUsers();

    if (users.some(u => u.username === username)) {
      message.textContent = "Username already exists. Try logging in.";
      message.className = "error";
      return;
    }

    users.push({ username, password });
    localStorage.setItem("users", JSON.stringify(users));

    message.textContent = "Registered successfully! You can now login.";
    message.className = "success";
  }

  function logout() {
    document.getElementById("hotelCard").style.display = "none";
    document.getElementById("loginCard").style.display = "block";
    document.getElementById("username").value = "";
    document.getElementById("password").value = "";
    document.getElementById("message").textContent = "";
  }
</script>

</body>
</html>
